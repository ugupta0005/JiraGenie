<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Settings · Bug Report Enhancer</title>
  <meta name="description" content="Configure Jira and Groq API settings for the Bug Report Enhancer." />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>⚙️</text></svg>" />
</head>
<body>

<!-- Toast container -->
<div class="toast-container" id="toastContainer"></div>

<div class="page-container">
  <div class="settings-container">

    <!-- Settings Header -->
    <div class="settings-header">
      <a href="/" class="back-btn" title="Back to main page" aria-label="Back to main page">←</a>
      <h1>⚙️ Settings</h1>
    </div>

    <!-- Jira Section -->
    <div class="settings-section">
      <div class="settings-section-title">
        🔷 Jira Connection Details
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="jiraUrl">
            <span class="label-icon">🌐</span> Jira URL
          </label>
          <input
            type="url"
            id="jiraUrl"
            placeholder="https://yourcompany.atlassian.net/"
            autocomplete="off"
          />
        </div>
        <div class="form-group">
          <label class="form-label" for="jiraEmail">
            <span class="label-icon">📧</span> Jira Email
          </label>
          <input
            type="email"
            id="jiraEmail"
            placeholder="you@company.com"
            autocomplete="email"
          />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="jiraApiKey">
          <span class="label-icon">🔑</span> Jira API Key
        </label>
        <div class="input-group">
          <input
            type="password"
            id="jiraApiKey"
            placeholder="Your Jira Cloud API token"
            autocomplete="off"
          />
          <button class="input-toggle" id="toggleJiraKey" aria-label="Toggle API key visibility" title="Show/hide API key">👁</button>
        </div>
        <small style="color: var(--text-muted); font-size: 0.78rem; margin-top: 6px; display: block;">
          Generate at <a href="https://id.atlassian.com/manage-profile/security/api-tokens" target="_blank" style="color: var(--accent-primary);">id.atlassian.com → Security → API tokens</a>
        </small>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label" for="jiraProjectKey">
            <span class="label-icon">📁</span> Project Key
          </label>
          <input
            type="text"
            id="jiraProjectKey"
            placeholder="e.g. BUG, QA, PROJ"
            autocomplete="off"
          />
        </div>
        <div class="form-group">
          <label class="form-label" for="jiraIssueType">
            <span class="label-icon">🏷️</span> Issue Type
          </label>
          <input
            type="text"
            id="jiraIssueType"
            placeholder="Bug"
            value="Bug"
            autocomplete="off"
          />
        </div>
      </div>

      <div class="connection-actions">
        <button class="btn btn-secondary btn-sm" id="testJiraBtn">
          🔌 Test Jira Connection
        </button>
        <div class="connection-status" id="jiraStatus" style="display:none"></div>
      </div>
    </div>

    <!-- Groq Section -->
    <div class="settings-section">
      <div class="settings-section-title">
        🤖 Groq AI Configuration
      </div>

      <div class="form-group">
        <label class="form-label" for="groqApiKey">
          <span class="label-icon">🔑</span> Groq API Key
        </label>
        <div class="input-group">
          <input
            type="password"
            id="groqApiKey"
            placeholder="gsk_..."
            autocomplete="off"
          />
          <button class="input-toggle" id="toggleGroqKey" aria-label="Toggle Groq API key visibility" title="Show/hide API key">👁</button>
        </div>
        <small style="color: var(--text-muted); font-size: 0.78rem; margin-top: 6px; display: block;">
          Get your free key at <a href="https://console.groq.com/keys" target="_blank" style="color: var(--accent-primary);">console.groq.com/keys</a>
        </small>
      </div>

      <div style="background: rgba(99,102,241,0.07); border: 1px solid rgba(99,102,241,0.2); border-radius: var(--radius-md); padding: 12px 16px; margin-bottom: 8px;">
        <div style="font-size: 0.8rem; color: var(--text-secondary); display: flex; align-items: center; gap: 8px;">
          <span>🦙</span>
          <span>Using model: <strong style="color: var(--text-primary);">meta-llama/llama-4-scout-17b-16e-instruct</strong> (free tier)</span>
        </div>
      </div>

      <div class="connection-actions">
        <button class="btn btn-secondary btn-sm" id="testGroqBtn">
          🔌 Test Groq Connection
        </button>
        <div class="connection-status" id="groqStatus" style="display:none"></div>
      </div>
    </div>

    <!-- Save Actions -->
    <div class="save-actions">
      <button class="btn btn-primary" id="saveBtn" style="flex:1">
        💾 Save Settings
      </button>
      <a href="/" class="btn btn-secondary">
        ← Back
      </a>
    </div>

  </div>
</div>

<script src="/js/settings.js"></script>
</body>
</html>
